name: admin
description: Admin management application
publish_to: none
version: 1.0.0+1

environment:
  sdk: ">=3.3.0 <4.0.0"

dependencies:
  flutter:
    sdk: flutter
  get: ^4.6.6
  flutter_dotenv: ^5.2.1
  flutter_svg: ^2.0.10+1
  shared_preferences: ^2.5.5
  intl: ^0.19.0
  image_picker: ^1.1.2
  image_cropper: ^9.1.0
  flutter_image_compress: ^2.4.0
  firebase_core: ^3.13.1
  firebase_messaging: ^15.2.5
  path_provider: ^2.1.4
  http: ^1.2.2
  open_filex: ^4.7.0
  shimmer: ^3.0.0
  core_network:
    path: ../../packages/core_network
  core_ui:
    path: ../../packages/core_ui
  core_utils:
    path: ../../packages/core_utils

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^3.0.2

flutter:
  uses-material-design: true
  assets:
    - assets/icons/
    - assets/images/login_bg.jpg
    - .env
