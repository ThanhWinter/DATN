name: customer
description: Customer application
publish_to: none
version: 1.0.0+1

environment:
  sdk: ">=3.3.0 <4.0.0"

dependencies:
  flutter:
    sdk: flutter
  get: ^4.6.6
  flutter_dotenv: ^5.2.1
  http: ^1.2.1
  crypto: ^3.0.3
  core_network:
    path: ../../packages/core_network
  core_ui:
    path: ../../packages/core_ui
  core_utils:
    path: ../../packages/core_utils
  geolocator: ^13.0.0
  flutter_svg: ^2.0.10+1

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^3.0.2

flutter:
  uses-material-design: true
  assets:
    - assets/icons/
    - assets/images/
    - .env
