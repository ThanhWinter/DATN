name: customer
description: Customer application
publish_to: none
version: 1.0.0+1

environment:
  sdk: ">=3.3.0 <4.0.0"

dependencies:
  flutter:
    sdk: flutter
  get: ^4.6.6
  flutter_dotenv: ^5.2.1
  core_network:
    path: ../../packages/core_network
  core_ui:
    path: ../../packages/core_ui
  core_utils:
    path: ../../packages/core_utils
  http: ^1.2.1
  geolocator: ^13.0.0
  image_picker: ^1.1.2
  flutter_svg: ^2.0.10+1
  shared_preferences: ^2.5.5
  intl: ^0.20.2
  firebase_core: ^3.13.1
  firebase_messaging: ^15.2.5
  share_plus: ^10.0.3

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^3.0.2

flutter:
  uses-material-design: true
  assets:
    - assets/icons/
    - assets/images/
    - .env
